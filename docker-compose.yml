version: '3.8'

services:
  db:
    image: postgres:16
    container_name: teamhub_db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-teamhubai}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - teamhub_network

  backend:
    build: ./backend
    container_name: teamhub_backend
    ports:
      - "8000:8000"
    depends_on:
      - db
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - teamhub_network

networks:
  teamhub_network:
    driver: bridge

volumes:
  postgres_data:
